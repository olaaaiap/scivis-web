<div class="home">

  <!-- Barra superior -->
  <header class="topbar">
    <div class="logo">
      <h2>IEEE 2026 SciVis Contest</h2>
    </div>

    <nav>
      <a routerLink="/home">Inicio</a>
      <a routerLink="/viewer" [queryParams]="{ port: 8080 }">Task 0 - 1</a>
      <a routerLink="/viewer" [queryParams]="{ port: 8081 }">Task 0 - 2</a>
      <a routerLink="/viewer" [queryParams]="{ port: 8082 }">Task 1</a>
    </nav>
  </header>

  <!-- Contenido principal -->
  <section class="hero">

    <div class="title-left">
      <h1>VISUALIZACIÓN DE DATOS</h1>
      <h2>ENTREGA DEL PROYECTO FINAL 2026</h2>
    </div>

    <div class="buttons">
      <button (click)="irAVisualizacion(8080)">TASK 0 - 1</button>
      <button (click)="irAVisualizacion(8081)">TASK 0 - 2</button>
      <button (click)="irAVisualizacion(8082)">TASK 1</button>
    </div>

  </section>

</div>
